<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petite Cup du Jour Rankings</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #10b981; --red: #ef4444;
  --mono: 'JetBrains Mono', monospace;
}
[data-theme="dark"] { --accent: #f59e0b; }
[data-theme="light"] { --accent: #b45309; }
[data-theme="dark"] {
  --bg: #08080d; --surface: rgba(255,255,255,0.02); --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.08); --text: #e5e7eb; --text-dim: #9ca3af;
  --text-muted: #6b7280; --text-dark: #4b5563;
  --surface-hover: rgba(255,255,255,0.05); --row-hover: rgba(255,255,255,0.03);
  --row-border: rgba(255,255,255,0.03);
  --scrollbar: rgba(255,255,255,0.1);
  --btn-hover: rgba(255,255,255,0.3); --btn-active-bg: rgba(255,255,255,0.03);
  --tooltip-bg: rgba(10,10,15,0.95); --tooltip-border: rgba(255,255,255,0.15);
  --row-stripe: rgba(255,255,255,0.015);
  --chart-grid: rgba(255,255,255,0.06); --chart-divider: rgba(255,255,255,0.15);
  --chart-label: rgba(255,255,255,0.2); --chart-guide: rgba(255,255,255,0.12);
  --dot-hl: #ffffff;
}
[data-theme="light"] {
  --bg: #f5f5f7; --surface: rgba(0,0,0,0.02); --border: rgba(0,0,0,0.08);
  --border-bright: rgba(0,0,0,0.12); --text: #1f2937; --text-dim: #4b5563;
  --text-muted: #6b7280; --text-dark: #9ca3af;
  --surface-hover: rgba(0,0,0,0.05); --row-hover: rgba(0,0,0,0.03);
  --row-border: rgba(0,0,0,0.05);
  --scrollbar: rgba(0,0,0,0.15);
  --btn-hover: rgba(0,0,0,0.3); --btn-active-bg: rgba(0,0,0,0.03);
  --tooltip-bg: rgba(255,255,255,0.95); --tooltip-border: rgba(0,0,0,0.15);
  --row-stripe: rgba(0,0,0,0.02);
  --chart-grid: rgba(0,0,0,0.06); --chart-divider: rgba(0,0,0,0.15);
  --chart-label: rgba(0,0,0,0.25); --chart-guide: rgba(0,0,0,0.15);
  --dot-hl: #f5f5f7;
}
html { background: var(--bg); color: var(--text); }
body { font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100vh; padding: 20px 12px; }
::selection { background: rgba(245,158,11,0.3); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

.container { max-width: 960px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 28px; position: relative; }
.header h1 {
  font-size: 28px; font-weight: 800; margin: 0;
  background: linear-gradient(135deg, #10b981, #3b82f6, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .sub { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 8px 0; }
.tabs { display: flex; gap: 3px; background: var(--surface-hover); border-radius: 8px; padding: 3px; }
.tab {
  padding: 6px 16px; border-radius: 6px; border: none; font-size: 12px;
  font-family: var(--mono); font-weight: 600; cursor: pointer;
  background: transparent; color: var(--text-muted); transition: all 0.15s;
}
.tab.active { background: rgba(16,185,129,0.2); color: #10b981; }
.tab:hover:not(.active) { color: var(--text-dim); }

.view-tabs { display: flex; gap: 3px; background: var(--surface-hover); border-radius: 8px; padding: 3px; }
.view-tab {
  padding: 6px 14px; border-radius: 6px; border: none; font-size: 11px;
  font-family: var(--mono); font-weight: 600; cursor: pointer;
  background: transparent; color: var(--text-muted); transition: all 0.15s;
}
.view-tab.active { background: rgba(245,158,11,0.2); color: var(--accent); }
.view-tab:hover:not(.active) { color: var(--text-dim); }

.table-header {
  display: grid; padding: 8px 12px; font-family: var(--mono); font-size: 10px;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-bright);
}
.table-header div { cursor: pointer; user-select: none; }
.table-header div:hover { color: var(--text-dim); }

.row {
  display: grid; padding: 7px 12px; border-bottom: 1px solid var(--row-border);
  font-size: 13px; cursor: pointer; transition: background 0.1s; align-items: center;
}
.row:hover { background: var(--row-hover); }
.row.selected { background: rgba(245,158,11,0.06); }
.row.zero-pts { opacity: 0.45; }

.rank { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
.pname { font-weight: 600; font-size: 13px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

.search-input {
  background: var(--surface-hover); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px; font-size: 11px;
  font-family: var(--mono); color: var(--text); outline: none;
  width: 150px; transition: border-color 0.15s; margin-left: auto;
}
.search-input::placeholder { color: var(--text-dark); }
.search-input:focus { border-color: rgba(245,158,11,0.4); }

.player { display: flex; align-items: center; gap: 6px; min-width: 0; }
.player .pname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.round-detail {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 14px 14px; animation: slideDown 0.15s ease-out;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.round-player-row {
  display: grid; padding: 3px 4px; align-items: center;
  border-bottom: 1px solid var(--row-border); font-size: 12px;
}
.round-player-row:nth-child(odd) { background: var(--row-stripe); }

.chart-panel {
  background: var(--row-hover); border: 1px solid var(--border-bright);
  border-radius: 10px; padding: 14px 12px; margin: 4px 0;
  animation: slideDown 0.15s ease-out;
}
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.chart-header .name { font-size: 16px; font-weight: 700; }
.chart-header .stats { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.chart-canvas { position: relative; }
.chart-canvas canvas { display: block; width: 100%; }
.chart-mode-btn {
  background: none; border: 1px solid var(--border-bright); color: var(--text-muted);
  border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 10px;
  font-family: var(--mono); transition: all 0.15s;
}
.chart-mode-btn:hover { border-color: var(--btn-hover); color: var(--text-dim); }
.chart-mode-btn.active { border-color: var(--mc); color: var(--mc); background: var(--btn-active-bg); }
.chart-mode-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

.close-btn {
  background: none; border: 1px solid var(--border-bright); color: var(--text-muted);
  border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px;
  font-family: var(--mono); transition: all 0.15s;
}
.close-btn:hover { border-color: var(--btn-hover); color: var(--accent); }
.tooltip {
  display: none; position: absolute; background: var(--tooltip-bg);
  border: 1px solid var(--tooltip-border); border-radius: 6px; padding: 6px 10px;
  font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  pointer-events: none; z-index: 10; white-space: nowrap;
}
.tooltip .t-round { color: var(--text); font-weight: 600; margin-bottom: 2px; }
.tooltip .t-val span { color: var(--accent); }

/* Tier colors for points */
.pts-legend { color: #dc2626; }
.pts-master { color: #f59e0b; }
.pts-diamond { color: #a855f7; }
.pts-plat { color: #3b82f6; }
.pts-gold { color: #10b981; }
.pts-low { color: var(--text-muted); }

.footer { margin-top: 12px; font-family: var(--mono); font-size: 10px; color: var(--text-dark); text-align: center; line-height: 1.6; }
.footer-link { display: inline-flex; align-items: center; gap: 5px; color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
.footer-link.yt:hover { color: #ff0000; }
.footer-link.tw:hover { color: #9146ff; }
.footer-link.dc:hover { color: #5865f2; }

.tier-legend {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  padding: 20px 0 8px; margin-top: 12px; border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: 11px;
}
.tier-item { display: flex; align-items: center; gap: 5px; }
.tier-dot { width: 8px; height: 8px; border-radius: 50%; }

.info-btn {
  background: none; border: 1px solid var(--border-bright); color: var(--text-muted);
  border-radius: 4px; padding: 2px 7px; cursor: pointer; font-size: 11px;
  font-family: var(--mono); margin-left: 2px; transition: all 0.15s; line-height: 1;
}
.info-btn:hover { border-color: var(--btn-hover); color: var(--accent); }

.info-tip-wrap { position: relative; display: inline-flex; align-items: center; }
.info-tip {
  display: none; position: absolute; top: 100%; left: 0; margin-top: 8px;
  background: var(--tooltip-bg); border: 1px solid var(--tooltip-border);
  border-radius: 8px; padding: 10px 14px; font-family: var(--mono); font-size: 10px;
  color: var(--text-dim); width: 300px; z-index: 20; line-height: 1.7;
  white-space: normal; text-align: left;
}
.info-tip code { color: var(--accent); font-size: 10px; }
.info-tip .st-head { color: var(--text); font-weight: 700; margin-bottom: 4px; }
.info-tip-wrap:hover .info-tip { display: block; }

.compare-toggle {
  display: flex; align-items: center; gap: 5px; cursor: pointer;
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  user-select: none; padding: 3px 0;
}
.compare-toggle input[type="checkbox"] {
  accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer;
}
.compare-panel {
  background: var(--row-hover); border: 1px solid var(--border-bright);
  border-radius: 10px; padding: 14px; margin-bottom: 16px;
  animation: slideDown 0.15s ease-out;
}
.comp-grid {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 4px 12px;
  font-family: var(--mono); font-size: 11px; align-items: center;
}
.comp-grid .comp-label { text-align: center; color: var(--text-muted); font-size: 9px; text-transform: uppercase; }
.comp-grid .comp-left { text-align: right; }
.comp-grid .comp-right { text-align: left; }
.comp-winner { font-weight: 700; }
.row.comp-p1 { background: rgba(6,182,212,0.08); }
.row.comp-p2 { background: rgba(249,115,22,0.08); }
.row.comp-p1:hover { background: rgba(6,182,212,0.12) !important; }
.row.comp-p2:hover { background: rgba(249,115,22,0.12) !important; }

.theme-toggle {
  position: absolute; top: 8px; right: 0;
  background: var(--surface-hover); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px; cursor: pointer;
  font-size: 16px; line-height: 1; transition: border-color 0.15s;
}
.theme-toggle:hover { border-color: var(--btn-hover); }
@media(max-width:700px){
  .table-header, .row { grid-template-columns: 28px 1fr 50px 28px 70px !important; font-size: 10px; padding: 5px 6px !important; }
  .table-header > :nth-child(4), .row > :nth-child(4),
  .table-header > :nth-child(7), .row > :nth-child(7),
  .table-header > :nth-child(8), .row > :nth-child(8) { display: none !important; }
  .pname { font-size: 11px; }
  .rank { font-size: 10px; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<div class="container">

<script>
// ── THEME ──
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = t === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  if (typeof render === 'function') render();
}
document.addEventListener('DOMContentLoaded', function() {
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  var btn = document.getElementById('themeToggle');
  btn.textContent = cur === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  btn.addEventListener('click', function() {
    setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
});

let data = null;
let currentSeason = null;
let viewMode = 'rankings';
let sortCol = 'points';
let sortDir = -1;
let pointsMode = 'ranking'; // 'ranking' (ATP drops) or 'championship' (OLR 10-1)
let compareMode = false;
let compareList = []; // up to 2 player names
let compareChartMode = 'ranking'; // 'ranking' (PCDJ cumulative) or 'season' (per-season)
const COMP_COLORS = ['#06b6d4', '#f97316'];

// Points tier color
// Season thresholds
const SEASON_THRESHOLDS = {
  championship: [100, 60, 35, 3],   // legend, pro, master, gold
  ranking:      [1900, 1200, 700, 60],
};
// PCDJ trailing thresholds (2 seasons combined, same % ratios)
const PCDJ_THRESHOLDS = {
  championship: [200, 120, 70, 5],
  ranking:      [3600, 2200, 1300, 100],
};
const TIER_COLORS = ['#dc2626', '#a855f7', '#3b82f6', '#10b981', '#6b7280'];

function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function ptsColor(pts) {
  const isPCDJ = data && data[currentSeason] && data[currentSeason].type === 'trailing';
  const thresholds = isPCDJ ? PCDJ_THRESHOLDS : SEASON_THRESHOLDS;
  const t = thresholds[pointsMode === 'championship' ? 'championship' : 'ranking'];
  for (let i = 0; i < t.length; i++) {
    if (pts >= t[i]) return TIER_COLORS[i];
  }
  return TIER_COLORS[4];
}

function ptsColorSingle(pts) {
  if (pointsMode === 'championship') {
    if (pts >= 9)  return '#dc2626';
    if (pts >= 7)  return '#a855f7';
    if (pts >= 5)  return '#3b82f6';
    if (pts >= 1)  return '#10b981';
    return '#6b7280';
  }
  if (pts >= 180) return '#dc2626';
  if (pts >= 140) return '#a855f7';
  if (pts >= 100) return '#3b82f6';
  if (pts >= 20)  return '#10b981';
  return '#6b7280';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
const customColors={"Lexer":"#10b981","Sandals":"#aa55ff","GuAlexItar":"#f5c842","justMaki":"#dc2626"};

function roundSortKey(name) {
  // Handle "Season N Round M", "Season N Troll N", plain "Round M", etc.
  const seasonMatch = name.match(/Season (\d+)/);
  const seasonNum = seasonMatch ? parseInt(seasonMatch[1]) * 10000 : 0;
  const numMatch = name.match(/\d+$/);
  const num = numMatch ? parseInt(numMatch[0]) : 0;
  // Troll/Roulette sort by their number among regular rounds (e.g. Troll 3 between Round 10 and Round 12)
  if (name.includes('Troll') || name.includes('Roulette')) {
    // Map special cups to their chronological position using PCDJ cup numbers
    // Troll 2 = after S2 Round 15, Roulette 2 = after S2 Round 16
    // Troll 3 = after S3 Round 10, Roulette 3 = after S3 Round 20
    const specialOrder = {
      'Troll 2': 15.5, 'Roulette 2': 16.5,
      'Troll 3': 10.5, 'Roulette 3': 20.5,
    };
    const key = name.replace(/Season \d+ /, '');
    return seasonNum + (specialOrder[key] || num + 0.5);
  }
  return seasonNum + num;
}

function updateInfoTip(season) {
  const tip = document.getElementById('infoTip');
  const total = season.total_events || season.rounds_total;
  const played = season.rounds_played || season.rounds_total;
  const isTrailing = season.type === 'trailing';
  const isChamp = pointsMode === 'championship';

  if (isChamp) {
    tip.innerHTML = `<div class="st-head">Championship Points</div>`
      + `OLR's original scoring:<br>`
      + `<code>1st=10 2nd=9 ... 10th=1</code><br><br>`
      + `All results count — no drops<br>`
      + `Troll & Roulette: <strong>excluded</strong><br><br>`
      + `${isTrailing ? (season.seasons ? season.seasons.join(' + ') : 'last 2 seasons') : `${played}/${total} rounds played`}`;
    return;
  }

  const pointsExplain = `Top 10 per round earn points:<br>`
    + `<code>1st=200 2nd=180 ... 10th=20</code><br>`
    + `Troll & Roulette: <strong>half</strong> points<br>`;

  if (isTrailing) {
    const seasons = season.seasons ? season.seasons.join(' + ') : 'last 2 seasons';
    tip.innerHTML = `<div class="st-head">PCDJ Ranking Points</div>`
      + `ATP-style trailing ranking across <strong>${seasons}</strong><br><br>`
      + pointsExplain + `<br>`
      + `Best <strong>${season.best_of}</strong> of ${played} total rounds count (70%)<br>`
      + `Worst ${played - season.best_of} results are always dropped<br><br>`
      + `Max: <code>${season.best_of} × 200 = ${season.best_of * 200}</code>`;
  } else if (season.drops_active) {
    tip.innerHTML = `<div class="st-head">${currentSeason} — Ranking Points</div>`
      + `${played}/${total} rounds played<br><br>`
      + pointsExplain + `<br>`
      + `Best <strong>${season.best_of}</strong> of ${total} rounds count (70%)<br>`
      + `Drops active — ${played - season.best_of} worst results excluded<br><br>`
      + `Max: <code>${season.best_of} × 200 = ${season.best_of * 200}</code>`;
  } else {
    tip.innerHTML = `<div class="st-head">${currentSeason} — Ranking Points</div>`
      + `${played}/${total} rounds played<br><br>`
      + pointsExplain + `<br>`
      + `All results count right now<br>`
      + `Drops start at round <strong>${season.best_of + 1}</strong>, then best ${season.best_of} of ${total} (70%)<br><br>`
      + `Max: <code>${season.best_of} × 200 = ${season.best_of * 200}</code>`;
  }
}

// --- Build rank history for a player ---
function buildRankHistory(playerName) {
  // Always use PCDJ Ranking (trailing) for full cross-season history
  const pcdj = data['PCDJ Ranking'];
  if (!pcdj) return [];

  const src = pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings;

  // Build round order with season labels
  // Collect per-season round lists to know the divider point
  const seasonRounds = {};
  Object.keys(data).forEach(sName => {
    if (data[sName].type === 'trailing') return;
    const sRankings = pointsMode === 'championship' && data[sName].championship ? data[sName].championship : data[sName].rankings;
    const rounds = new Set();
    sRankings.forEach(p => p.history.forEach(h => rounds.add(h.r)));
    seasonRounds[sName] = [...rounds];
  });

  // Get all rounds from PCDJ data
  const allRounds = new Set();
  src.forEach(p => p.history.forEach(h => allRounds.add(h.r)));
  const roundOrder = [...allRounds].sort((a, b) => roundSortKey(a) - roundSortKey(b));

  // Find season divider index
  const s2Rounds = seasonRounds['Season 2'] || [];
  let seasonDividerIdx = s2Rounds.length; // rounds in S2

  // Compute cumulative points for ALL players after each round
  const cumulative = {};
  const snapshots = [];

  roundOrder.forEach(rName => {
    src.forEach(p => {
      if (!cumulative[p.name]) cumulative[p.name] = 0;
      const entry = p.history.find(h => h.r === rName);
      if (entry) cumulative[p.name] += entry.p;
    });
    const ranked = Object.entries(cumulative)
      .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    snapshots.push({ round: rName, rankings: ranked });
  });

  // Extract this player's rank at each round
  const result = [];
  let cumulPts = 0;
  let seasonPts = 0;
  let currentSeason = null;
  const playerEntry = src.find(p => p.name === playerName);
  if (!playerEntry) return [];

  snapshots.forEach((snap, i) => {
    // Track per-season cumulative — reset when season changes
    const rSeason = snap.round.startsWith('Season 3') ? 'S3' : 'S2';
    if (currentSeason && rSeason !== currentSeason) seasonPts = 0;
    currentSeason = rSeason;

    const roundEntry = playerEntry.history.find(h => h.r === snap.round);
    if (roundEntry) { cumulPts += roundEntry.p; seasonPts += roundEntry.p; }
    if (roundEntry || cumulPts > 0) {
      const rank = snap.rankings.findIndex(([n]) => n === playerName) + 1;
      if (rank > 0) result.push({ round: snap.round, roundIdx: i + 1, rank, pts: cumulPts, seasonPts, roundPts: roundEntry ? roundEntry.p : 0, pos: roundEntry ? roundEntry.pos : null });
    }
  });
  result.seasonDividerIdx = seasonDividerIdx;
  result.totalRounds = roundOrder.length;
  return result;
}

function buildSeasonRankHistory(playerName) {
  // Build per-season rank histories for ALL seasons, mapped to PCDJ x-axis
  // Returns { s2: [...], s3: [...] } with rank computed within each season independently

  const pcdj = data['PCDJ Ranking'];
  const pcdjSrc = pcdj ? (pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings) : null;
  const pcdjAllRounds = new Set();
  if (pcdjSrc) pcdjSrc.forEach(p => p.history.forEach(h => pcdjAllRounds.add(h.r)));
  const pcdjRoundOrder = [...pcdjAllRounds].sort((a, b) => roundSortKey(a) - roundSortKey(b));

  const seasonKeys = Object.keys(data).filter(s => data[s].type === 'season');
  const allSegments = [];

  seasonKeys.forEach(sName => {
    const season = data[sName];
    const src = pointsMode === 'championship' && season.championship ? season.championship : season.rankings;

    const allRounds = new Set();
    src.forEach(p => p.history.forEach(h => allRounds.add(h.r)));
    const roundOrder = [...allRounds].sort((a, b) => roundSortKey(a) - roundSortKey(b));

    const cumulative = {};
    const snapshots = [];
    roundOrder.forEach(rName => {
      src.forEach(p => {
        if (!cumulative[p.name]) cumulative[p.name] = 0;
        const entry = p.history.find(h => h.r === rName);
        if (entry) cumulative[p.name] += entry.p;
      });
      const ranked = Object.entries(cumulative)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
      snapshots.push({ round: rName, rankings: ranked });
    });

    const playerEntry = src.find(p => p.name === playerName);
    if (!playerEntry) return;

    const segment = [];
    let cumulPts = 0;
    snapshots.forEach((snap) => {
      const roundEntry = playerEntry.history.find(h => h.r === snap.round);
      if (roundEntry) cumulPts += roundEntry.p;
      if (roundEntry || cumulPts > 0) {
        const rank = snap.rankings.findIndex(([n]) => n === playerName) + 1;
        const prefixed = sName + ' ' + snap.round;
        const pcdjIdx = pcdjRoundOrder.indexOf(prefixed) + 1;
        if (rank > 0) segment.push({ round: snap.round, roundIdx: pcdjIdx > 0 ? pcdjIdx : 0, rank, pts: cumulPts, seasonPts: cumulPts, roundPts: roundEntry ? roundEntry.p : 0, pos: roundEntry ? roundEntry.pos : null });
      }
    });
    if (segment.length) allSegments.push(segment);
  });

  return allSegments; // array of segments, one per season
}

function buildChartStats(playerName) {
  const parts = [];
  const seasonKeys = Object.keys(data).filter(s => data[s].type === 'season');
  seasonKeys.forEach(sName => {
    const src = pointsMode === 'championship' && data[sName].championship ? data[sName].championship : data[sName].rankings;
    const p = src.find(x => x.name === playerName);
    if (!p) return;
    const rank = p.rank;
    const totalPod = p.podiums.gold + p.podiums.silver + p.podiums.bronze;
    let detail = '';
    if (p.wins > 0) detail = `${p.wins}W`;
    else if (totalPod > 0) detail = `${p.podiums.gold}/${p.podiums.silver}/${p.podiums.bronze}`;
    else detail = `best #${p.best_pos}`;
    const label = sName.replace('Season ', 'S');
    parts.push(`${label}: <strong>#${rank}</strong> (${detail})`);
  });
  // Current season rounds
  const curSrc = pointsMode === 'championship' && data[currentSeason]?.championship ? data[currentSeason].championship : data[currentSeason]?.rankings;
  const curP = curSrc?.find(x => x.name === playerName);
  if (curP) parts.push(`${curP.rounds} rounds`);
  return parts.join(' · ');
}

// --- Draw rank chart ---
function drawRankChart(player, panel) {
  const rankHist = buildRankHistory(player.name);
  if (rankHist.length === 0) return;

  // Stats from current season/tab, chart history from PCDJ
  const chartPlayer = player;
  const mainColor = ptsColor(chartPlayer.points);
  const pcdj = data['PCDJ Ranking'];
  const pcdjSrc = pcdj ? (pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings) : null;
  const pcdjPlayer = pcdjSrc ? pcdjSrc.find(p => p.name === player.name) : null;

  // Chart modes — cycle through states
  // Rank: 'pcdj' (default) → 'season' → 'off'
  // Position: 'on' → 'off'
  // Points: 'season' (default) → 'pcdj' → 'off'
  const isZeroPts = chartPlayer.points === 0;
  let rankMode = isZeroPts ? 'off' : 'pcdj', posMode = isZeroPts ? 'on' : 'off', ptsMode = 'off';

  // Pick colors that don't clash with the player's tier color
  // Check both season and PCDJ tier colors to avoid any overlap
  const RANK_COLOR = mainColor;
  const usedColors = new Set([mainColor]);
  // Also check PCDJ color if different
  if (pcdjPlayer) usedColors.add(ptsColor(pcdjPlayer.points));
  const colorPool = ['#f59e0b', '#ec4899', '#3b82f6', '#10b981', '#ef4444', '#a855f7'];
  const available = colorPool.filter(c => !usedColors.has(c));
  const POS_COLOR = available[0] || '#f59e0b';
  const PTS_COLOR = available[1] || '#ec4899';

  function buildPanel() {
    const posInfo = `<span class="info-tip-wrap"><span class="info-btn" style="font-size:9px;padding:0 3px;margin-left:3px;pointer-events:auto;cursor:help" onclick="event.stopPropagation()">\u2139</span>`
      + `<div class="info-tip" style="width:220px"><div class="st-head">Cup Position</div>Only top 10 positions are logged.</div></span>`;
    panel.innerHTML = `
      <div class="chart-header">
        <div style="min-width:0;overflow:hidden">
          <span class="name" style="color:${mainColor}">${esc(chartPlayer.name)}</span><br>
          <span class="stats">${buildChartStats(chartPlayer.name)}</span>
        </div>
        <button class="close-btn" id="closeChart">✕</button>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:6px">
        <button class="chart-mode-btn${rankMode !== 'off' ? ' active' : ''}${isZeroPts ? ' disabled' : ''}" data-mode="rank" style="--mc:${RANK_COLOR}"${isZeroPts ? ' disabled' : ''}>Rank${rankMode !== 'off' ? ` <span style="font-size:8px;opacity:0.7">${rankMode === 'pcdj' ? 'PCDJ' : 'Season'}</span>` : ''}</button>
        <button class="chart-mode-btn${posMode === 'on' ? ' active' : ''}" data-mode="pos" style="--mc:${POS_COLOR}">Position ${posInfo}</button>
        <button class="chart-mode-btn${ptsMode !== 'off' ? ' active' : ''}${isZeroPts ? ' disabled' : ''}" data-mode="pts" style="--mc:${PTS_COLOR}"${isZeroPts ? ' disabled' : ''}>Points${ptsMode !== 'off' ? ` <span style="font-size:8px;opacity:0.7">${ptsMode === 'season' ? 'Season' : 'PCDJ'}</span>` : ''}</button>
      </div>
      <div class="chart-canvas"><canvas id="rankCanvas"></canvas><div class="tooltip" id="chartTip"></div></div>
    `;
    panel.querySelector('#closeChart').onclick = () => {
      panel.remove();
      document.querySelectorAll('.row.selected').forEach(r => r.classList.remove('selected'));
    };
    panel.querySelectorAll('.chart-mode-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        if (btn.dataset.mode === 'rank') {
          rankMode = rankMode === 'pcdj' ? 'season' : rankMode === 'season' ? 'off' : 'pcdj';
        }
        if (btn.dataset.mode === 'pos') {
          posMode = posMode === 'off' ? 'on' : 'off';
        }
        if (btn.dataset.mode === 'pts') {
          ptsMode = ptsMode === 'off' ? 'season' : ptsMode === 'season' ? 'pcdj' : 'off';
        }
        if (rankMode === 'off' && posMode === 'off' && ptsMode === 'off') { isZeroPts ? posMode = 'on' : rankMode = 'pcdj'; }
        buildPanel();
        drawCanvas();
      };
    });
  }

  function drawCanvas() {
    const canvas = panel.querySelector('#rankCanvas');
    const tip = panel.querySelector('#chartTip');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = 180 * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = '180px';
    ctx.scale(dpr, dpr);

    const W = rect.width, H = 180;
    const hasRight = ptsMode !== 'off';
    const pad = { l: 36, r: hasRight ? 42 : 12, t: 12, b: 28 };

    let totalRounds = 0;
    Object.keys(data).forEach(s => { if (data[s].type === 'season') totalRounds += (data[s].rounds_played || 0); });
    if (!totalRounds) totalRounds = 26;
    const seasonDivider = rankHist.seasonDividerIdx || 0;
    const xMin = 1, xMax = totalRounds;

    function xf(idx) { return pad.l + (idx - xMin) / (xMax - xMin || 1) * (W - pad.l - pad.r); }

    // Left Y: rank and/or position (inverted, 1 at top)
    const seasonRankSegments = rankMode === 'season' ? buildSeasonRankHistory(chartPlayer.name) : null;

    const leftValues = [];
    if (rankMode !== 'off') {
      if (seasonRankSegments) seasonRankSegments.forEach(seg => seg.forEach(d => leftValues.push(d.rank)));
      else rankHist.forEach(d => leftValues.push(d.rank));
    }
    if (posMode === 'on') rankHist.forEach(d => leftValues.push(d.pos ? (isZeroPts ? d.pos : Math.min(d.pos, 11)) : 11));
    const leftMin = 1;
    const leftMax = Math.max(...leftValues, 5);
    function yLeft(v) { return pad.t + (v - leftMin) / (leftMax - leftMin || 1) * (H - pad.t - pad.b); }

    // Right Y: points (normal, 0 at bottom)
    const ptsMax = Math.max(...rankHist.map(d => ptsMode === 'pcdj' ? d.pts : d.seasonPts), 100);
    function yRight(v) { return pad.t + (1 - v / ptsMax) * (H - pad.t - pad.b); }

    function draw(highlight) {
      ctx.clearRect(0, 0, W, H);

      // Season divider
      if (seasonDivider > 0 && seasonDivider < totalRounds) {
        const divX = xf(seasonDivider + 0.5);
        ctx.strokeStyle = cssVar('--chart-divider'); ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(divX, pad.t); ctx.lineTo(divX, H - pad.b); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = cssVar('--chart-label'); ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'center';
        ctx.fillText('S2', (pad.l + divX) / 2, pad.t + 10);
        ctx.fillText('S3', (divX + W - pad.r) / 2, pad.t + 10);
      }

      // Left Y grid
      ctx.strokeStyle = cssVar('--chart-grid'); ctx.lineWidth = 1;
      if (rankMode !== 'off' || posMode === 'on') {
        const ySteps = Math.min(leftMax, 6);
        for (let i = 0; i <= ySteps; i++) {
          const rv = Math.round(leftMin + (leftMax - leftMin) * i / ySteps);
          const yv = yLeft(rv);
          ctx.beginPath(); ctx.moveTo(pad.l, yv); ctx.lineTo(W - pad.r, yv); ctx.stroke();
          ctx.fillStyle = '#6b7280'; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'right';
          ctx.fillText('#' + rv, pad.l - 6, yv + 3);
        }
      }

      // Right Y labels (points)
      if (ptsMode !== 'off') {
        const pSteps = 5;
        for (let i = 0; i <= pSteps; i++) {
          const pv = Math.round(ptsMax * i / pSteps);
          const yv = yRight(pv);
          if (!rankMode !== 'off' && !posMode === 'on') {
            ctx.beginPath(); ctx.moveTo(pad.l, yv); ctx.lineTo(W - pad.r, yv); ctx.stroke();
          }
          ctx.fillStyle = PTS_COLOR; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'left';
          ctx.fillText(pv, W - pad.r + 4, yv + 3);
        }
      }

      // X axis
      ctx.fillStyle = '#6b7280'; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'center';
      for (let t = xMin; t <= xMax; t++) ctx.fillText(t, xf(t), H - 6);

      // #1 reference line
      if (rankMode !== 'off' || posMode === 'on') {
        ctx.strokeStyle = cssVar('--chart-guide'); ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(pad.l, yLeft(1)); ctx.lineTo(W - pad.r, yLeft(1)); ctx.stroke();
        ctx.setLineDash([]);
      }

      // --- Draw lines ---
      function drawLine(points, color, yFn, valueKey, skipNull) {
        const filtered = skipNull ? points.filter(pt => pt[valueKey] != null) : points;
        if (!filtered.length) return;
        // Line — break at gaps when skipNull
        ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
        ctx.beginPath();
        let drawing = false;
        filtered.forEach((pt, i) => {
          const px = xf(pt.roundIdx), py = yFn(pt[valueKey]);
          if (!drawing) { ctx.moveTo(px, py); drawing = true; }
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
        // Glow
        ctx.save(); ctx.globalAlpha = 0.12; ctx.strokeStyle = color; ctx.lineWidth = 6;
        ctx.beginPath(); drawing = false;
        filtered.forEach((pt) => {
          const px = xf(pt.roundIdx), py = yFn(pt[valueKey]);
          if (!drawing) { ctx.moveTo(px, py); drawing = true; }
          else ctx.lineTo(px, py);
        });
        ctx.stroke(); ctx.restore();
        // Dots
        filtered.forEach(pt => {
          const isHl = highlight && pt.roundIdx === highlight.roundIdx;
          const isWin = pt.pos === 1 && valueKey === 'rank';
          const px = xf(pt.roundIdx), py = yFn(pt[valueKey]);
          if (isWin) {
            const r = isHl ? 7 : 4.5;
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
              const ang = -Math.PI / 2 + i * Math.PI / 5;
              const rad = i % 2 === 0 ? r : r * 0.45;
              ctx[i === 0 ? 'moveTo' : 'lineTo'](px + Math.cos(ang) * rad, py + Math.sin(ang) * rad);
            }
            ctx.closePath();
            ctx.fillStyle = '#ffd700'; ctx.fill();
            ctx.strokeStyle = '#b8960c'; ctx.lineWidth = isHl ? 1.5 : 1; ctx.stroke();
          } else {
            ctx.beginPath(); ctx.arc(px, py, isHl ? 5 : 2.5, 0, Math.PI * 2);
            if (isHl) { ctx.fillStyle = cssVar('--dot-hl'); ctx.fill(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke(); }
            else { ctx.fillStyle = color; ctx.fill(); }
          }
        });
      }

      // Points line (behind rank/pos)
      if (ptsMode !== 'off') {
        if (ptsMode === 'pcdj') {
          // PCDJ: continuous cumulative across all seasons
          drawLine(rankHist, PTS_COLOR, yRight, 'pts', false);
        } else {
          // Season: per-season cumulative, break at season boundary
          const s2Pts = rankHist.filter(pt => pt.roundIdx <= seasonDivider);
          const s3Pts = rankHist.filter(pt => pt.roundIdx > seasonDivider);
          if (s2Pts.length) drawLine(s2Pts, PTS_COLOR, yRight, 'seasonPts', false);
          if (s3Pts.length) drawLine(s3Pts, PTS_COLOR, yRight, 'seasonPts', false);
        }
      }

      // Position line — only rounds where player has a position
      if (posMode === 'on') {
        const posData = rankHist
          .filter(pt => pt.pos != null)
          .map(pt => ({ ...pt, posVal: isZeroPts ? pt.pos : Math.min(pt.pos, 11) }));
        drawLine(posData, POS_COLOR, yLeft, 'posVal', false);
      }

      // Rank line (on top) — PCDJ (continuous) or season (per-season segments)
      if (rankMode !== 'off') {
        if (seasonRankSegments) {
          seasonRankSegments.forEach(seg => {
            const filtered = seg.filter(pt => pt.pos != null);
            if (filtered.length) drawLine(filtered, RANK_COLOR, yLeft, 'rank', false);
          });
        } else {
          const filtered = rankHist.filter(pt => pt.pos != null);
          drawLine(filtered, RANK_COLOR, yLeft, 'rank', false);
        }
      }
    }

    draw(null);

    // Tooltip
    canvas.onmousemove = (e) => {
      const br = canvas.getBoundingClientRect();
      const mx = e.clientX - br.left;
      let closest = null, minDist = Infinity;
      rankHist.forEach(pt => { const d = Math.abs(xf(pt.roundIdx) - mx); if (d < minDist) { minDist = d; closest = pt; } });
      if (closest && minDist < 30) {
        canvas.style.cursor = 'pointer';
        tip.style.display = 'block';
        let html = `<div class="t-round">${esc(closest.round)}</div>`;
        // Rank — matches current button mode
        if (rankMode !== 'off') {
          let rankVal = closest.rank; // default PCDJ rank
          if (rankMode === 'season' && seasonRankSegments) {
            // Find this round in season segments
            for (const seg of seasonRankSegments) {
              const match = seg.find(pt => pt.roundIdx === closest.roundIdx);
              if (match) { rankVal = match.rank; break; }
            }
          }
          html += `<div class="t-val" style="color:${RANK_COLOR}">${rankMode === 'pcdj' ? 'PCDJ' : 'Season'} Rank: <span>#${rankVal}</span></div>`;
        }
        // Position — always show if player played this round, hide if no data
        if (closest.pos != null) {
          html += `<div class="t-val">Position: <span>#${closest.pos}</span></div>`;
        }
        // Points
        if (ptsMode !== 'off') html += `<div class="t-val" style="color:${PTS_COLOR}">${ptsMode === 'pcdj' ? 'PCDJ' : 'Season'} pts: <span>${ptsMode === 'pcdj' ? closest.pts : closest.seasonPts}</span></div>`;
        if (closest.roundPts) html += `<div class="t-val">Round: <span>+${closest.roundPts}</span></div>`;
        tip.innerHTML = html;
        let tx = xf(closest.roundIdx) + 12;
        if (tx + 160 > W) tx = xf(closest.roundIdx) - 170;
        const posVal = isZeroPts ? (closest.pos || 11) : Math.min(closest.pos || 11, 11);
        const primaryY = rankMode !== 'off' ? yLeft(closest.rank) : posMode === 'on' ? yLeft(posVal) : yRight(ptsMode === 'pcdj' ? closest.pts : closest.seasonPts);
        tip.style.left = tx + 'px';
        tip.style.top = (primaryY - 40) + 'px';
        draw(closest);
      } else {
        canvas.style.cursor = ''; tip.style.display = 'none'; draw(null);
      }
    };
    canvas.onmouseleave = () => { tip.style.display = 'none'; canvas.style.cursor = ''; draw(null); };
    canvas.onclick = (e) => {
      const br = canvas.getBoundingClientRect();
      const mx = e.clientX - br.left;
      let closest = null, minDist = Infinity;
      rankHist.forEach(pt => { const d = Math.abs(xf(pt.roundIdx) - mx); if (d < minDist) { minDist = d; closest = pt; } });
      if (!closest || minDist >= 30) return;
      // Determine season and round name from PCDJ prefixed round
      const rName = closest.round; // e.g. "Season 2 Round 5" or "Season 3 Troll 2"
      const match = rName.match(/^(Season \d+)\s+(.+)$/);
      if (!match) return;
      const targetSeason = match[1]; // "Season 2"
      const targetRound = match[2]; // "Round 5"
      // Switch to that season's rounds view
      currentSeason = targetSeason;
      viewMode = 'rounds';
      document.querySelectorAll('.view-tab[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === 'rounds'));
      buildSeasonTabs();
      render();
      // Auto-expand the target round
      setTimeout(() => {
        const row = document.querySelector(`.round-row[data-round="${CSS.escape(targetRound)}"]`);
        if (row) { row.click(); row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }, 50);
    };
  }

  buildPanel();
  drawCanvas();
}

// --- Season tabs ---
function buildSeasonTabs() {
  const container = document.getElementById('seasonTabs');
  container.innerHTML = '';
  Object.keys(data).forEach(season => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (season === currentSeason ? ' active' : '');
    btn.textContent = season;
    btn.onclick = () => { currentSeason = season; buildSeasonTabs(); render(); };
    container.appendChild(btn);
  });
}

// --- Ranking columns ---
const RANK_COLS = '36px 1fr 70px 45px 45px 105px 40px 65px';

function renderRankingsHeader() {
  const header = document.getElementById('tableHeader');
  header.style.gridTemplateColumns = RANK_COLS;
  const cols = [
    { key: 'rank', label: '#', align: 'left' },
    { key: 'name', label: 'Player', align: 'left' },
    { key: 'points', label: 'Pts', align: 'right' },
    { key: 'rounds', label: 'Rnds', align: 'right' },
    { key: 'wins', label: 'W', align: 'right' },
    { key: 'podiums', label: 'Podium', align: 'center' },
    { key: 'best_pos', label: 'Best', align: 'right' },
    { key: 'avg_pos', label: 'Avg Pos', align: 'right' },
  ];
  header.innerHTML = cols.map(c => {
    const active = sortCol === c.key;
    const arrow = active ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
    return `<div data-sort="${c.key}" style="text-align:${c.align};color:${active ? 'var(--text)' : 'inherit'}">${c.label}${arrow}</div>`;
  }).join('');
  header.querySelectorAll('[data-sort]').forEach(el => {
    el.onclick = () => {
      const col = el.dataset.sort;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = ['name', 'best_pos', 'avg_pos'].includes(col) ? 1 : -1; }
      render();
    };
  });
}

function renderRankings() {
  const season = data[currentSeason];
  if (!season) return;
  renderRankingsHeader();

  updateInfoTip(season);

  const src = pointsMode === 'championship' && season.championship ? season.championship : season.rankings;
  let rankings = [...src];

  // Sort
  rankings.sort((a, b) => {
    let av, bv;
    switch (sortCol) {
      case 'rank': av = a.rank; bv = b.rank; break;
      case 'name': av = a.name; bv = b.name; return av.localeCompare(bv) * sortDir;
      case 'points': av = a.points; bv = b.points; break;
      case 'rounds': av = a.rounds; bv = b.rounds; break;
      case 'wins': av = a.wins; bv = b.wins; break;
      case 'podiums': av = a.podiums.gold+a.podiums.silver+a.podiums.bronze; bv = b.podiums.gold+b.podiums.silver+b.podiums.bronze; break;
      case 'best_pos': av = a.best_pos; bv = b.best_pos; break;
      case 'avg_pos': av = a.avg_pos; bv = b.avg_pos; break;
      default: av = a.points; bv = b.points;
    }
    return (av - bv) * sortDir || (b.points - a.points) || (a.best_pos - b.best_pos) || (b.rounds - a.rounds);
  });

  // Status snapshot lookup for rank arrows
  const statusKey = currentSeason.toLowerCase().replace(/ /g, '_');
  const snap = statusData[statusKey] || {};

  const body = document.getElementById('tableBody');
  body.innerHTML = rankings.map((p, i) => {
    const c = ptsColor(p.points);
    const wc = p.wins > 0 ? 'var(--accent)' : 'var(--text-dark)';
    const totalPod = p.podiums.gold + p.podiums.silver + p.podiums.bronze;
    const prevPod = snap[p.name] ? { g: snap[p.name][3], s: snap[p.name][4], b: snap[p.name][5] } : null;
    const podDeltas = [];
    if (prevPod && p.podiums.gold > prevPod.g) podDeltas.push(`<span style="color:var(--accent)">+${p.podiums.gold - prevPod.g}G</span>`);
    if (prevPod && p.podiums.silver > prevPod.s) podDeltas.push(`<span style="color:#6b7280">+${p.podiums.silver - prevPod.s}S</span>`);
    if (prevPod && p.podiums.bronze > prevPod.b) podDeltas.push(`<span style="color:#78716c">+${p.podiums.bronze - prevPod.b}B</span>`);
    const podDeltaStr = podDeltas.length ? `<span style="font-size:10px;position:absolute;left:100%;white-space:nowrap;margin-left:4px">${podDeltas.join(' ')}</span>` : '';
    const podStr = totalPod > 0
      ? `<span style="position:relative;display:inline-block"><span style="color:var(--accent)">${p.podiums.gold}</span>/<span style="color:#6b7280">${p.podiums.silver}</span>/<span style="color:#78716c">${p.podiums.bronze}</span> <span style="color:var(--text-muted)">(${totalPod})</span>${podDeltaStr}</span>`
      : `<span style="color:var(--text-dark)">0</span>`;
    const bestC = p.best_pos === 1 ? 'var(--accent)' : p.best_pos <= 3 ? 'var(--text)' : 'var(--text-dim)';
    const avgPosC = p.avg_pos <= 3 ? 'var(--green)' : p.avg_pos <= 5 ? 'var(--text-dim)' : 'var(--text-muted)';
    const compClass = compareMode && compareList[0] === p.name ? ' comp-p1' : compareMode && compareList[1] === p.name ? ' comp-p2' : '';
    // Rank change arrow (use p.rank, not sort position)
    const displayRank = i + 1;
    const prev = snap[p.name];
    let deltaStr = '';
    if (prev && p.points > 0) {
      const diff = prev[0] - p.rank;
      if (diff > 0) deltaStr = `<span style="color:var(--green);font-size:10px;margin-left:4px">+${diff}</span>`;
      else if (diff < 0) deltaStr = `<span style="color:var(--red);font-size:10px;margin-left:4px">${diff}</span>`;
    } else if (Object.keys(snap).length > 0 && p.points > 0 && !prev) {
      deltaStr = `<span style="color:var(--green);font-size:10px;margin-left:4px">NEW</span>`;
    }
    // Milestone indicators: [rank, pts, wins, gold, silver, bronze]
    let milestones = [];
    if (prev && p.points > 0) {
      const [, , oldW, oldG, oldS, oldB] = prev;
      const totalPodOld = oldG + oldS + oldB;
      const totalPodNew = p.podiums.gold + p.podiums.silver + p.podiums.bronze;
      if (p.wins > 0 && oldW === 0) milestones.push('🏆 1st Win!');
      if (totalPodNew > 0 && totalPodOld === 0) milestones.push('🥇 1st Podium!');
    }
    const milestoneStr = milestones.length ? ` <span style="font-size:9px;color:var(--accent)">${milestones.join(' ')}</span>` : '';
    const zeroClass = p.points === 0 ? ' zero-pts' : '';
    return `<div class="row${compClass}${zeroClass}" data-name="${esc(p.name)}" style="grid-template-columns:${RANK_COLS}">
      <div class="rank">${displayRank}${deltaStr}</div>
      <div class="player"><span class="dot" style="background:${c};box-shadow:0 0 5px ${c}40"></span><span class="pname" style="color:${customColors[p.name]||''}">${esc(p.name)}</span>${milestoneStr}</div>
      <div style="text-align:right;font-family:var(--mono);font-weight:700;color:${c}">${prev && p.points > 0 && p.points - prev[1] > 0 ? `<span style="color:var(--green);font-size:10px;margin-right:4px">+${Math.round(p.points - prev[1])}</span>` : ''}${p.points}</div>
      <div style="text-align:right;font-family:var(--mono);color:var(--text-dim)">${p.rounds}</div>
      <div style="text-align:right;font-family:var(--mono);font-weight:600;color:${wc}">${p.wins}</div>
      <div style="text-align:center;font-family:var(--mono)">${podStr}</div>
      <div style="text-align:right;font-family:var(--mono);color:${bestC}">${p.best_pos}</div>
      <div style="text-align:right;font-family:var(--mono);color:${avgPosC}">${p.avg_pos}</div>
    </div>`;
  }).join('');

  // Click row to expand rank chart or compare
  body.querySelectorAll('.row').forEach(row => {
    row.onclick = () => {
      const name = row.dataset.name;
      if (compareMode) {
        const idx = compareList.indexOf(name);
        if (idx >= 0) compareList.splice(idx, 1);
        else if (compareList.length < 2) compareList.push(name);
        else compareList = [compareList[1], name];
        body.querySelectorAll('.row').forEach(r => {
          r.classList.remove('comp-p1', 'comp-p2');
          if (r.dataset.name === compareList[0]) r.classList.add('comp-p1');
          else if (compareList[1] && r.dataset.name === compareList[1]) r.classList.add('comp-p2');
        });
        renderComparePanel();
        return;
      }
      const existing = body.querySelectorAll('.chart-panel');
      existing.forEach(e => e.remove());
      if (row.classList.contains('selected')) { row.classList.remove('selected'); return; }
      body.querySelectorAll('.row.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');

      const playerSrc = pointsMode === 'championship' && season.championship ? season.championship : season.rankings;
      const player = playerSrc.find(p => p.name === row.dataset.name);
      if (!player) return;

      const panel = document.createElement('div');
      panel.className = 'chart-panel';
      row.after(panel);
      drawRankChart(player, panel);
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };
  });
}

// --- Rounds view ---
const ROUND_COLS = '36px 1fr 60px 80px 80px';

function strengthColor(val) {
  if (val >= 92) return '#10b981';
  if (val >= 90) return '#84cc16';
  if (val >= 88) return '#eab308';
  if (val >= 85) return '#f97316';
  return '#ef4444';
}

function renderRoundsHeader() {
  const header = document.getElementById('tableHeader');
  header.style.gridTemplateColumns = ROUND_COLS;
  header.innerHTML = `<div>#</div><div>Round</div><div style="text-align:center">Players</div><div style="text-align:center">Winner</div><div style="text-align:center">SOF</div>`;
}

function renderRounds() {
  const season = data[currentSeason];
  if (!season) return;
  renderRoundsHeader();
  updateInfoTip(season);

  // We need the raw rounds data — stored in rankings JSON under each player's history
  // Reconstruct rounds from player histories
  const roundMap = {};
  season.rankings.forEach(p => {
    p.history.forEach(h => {
      if (!roundMap[h.r]) roundMap[h.r] = [];
      roundMap[h.r].push({ name: p.name, pos: h.pos, pts: h.p });
    });
  });

  const roundNames = Object.keys(roundMap);
  roundNames.sort((a, b) => roundSortKey(a) - roundSortKey(b));

  const body = document.getElementById('tableBody');
  const strengths = season.round_strengths || {};
  body.innerHTML = roundNames.map((rName, i) => {
    const players = roundMap[rName].sort((a, b) => a.pos - b.pos);
    const winner = players[0];
    const isHalf = rName.includes('Troll') || rName.includes('Roulette');
    const typeLabel = isHalf ? ' <span style="color:var(--text-dark);font-size:10px">½</span>' : '';
    const sof = strengths[rName];
    const sofHtml = sof ? `<span style="color:${strengthColor(sof)};font-weight:600">${sof.toFixed(1)}</span>` : '<span style="color:var(--text-dark)">—</span>';
    return `<div class="row round-row" data-round="${esc(rName)}" style="grid-template-columns:${ROUND_COLS}">
      <div class="rank">${i + 1}</div>
      <div style="font-size:13px">${esc(rName)}${typeLabel}</div>
      <div style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-muted)">${players.length}</div>
      <div style="text-align:center;font-size:12px;font-weight:600;color:var(--accent)">${esc(winner?.name || '—')}</div>
      <div style="text-align:center;font-family:var(--mono);font-size:11px">${sofHtml}</div>
    </div>`;
  }).join('');

  // Click round to expand
  body.querySelectorAll('.round-row').forEach(row => {
    row.onclick = () => {
      const existing = body.querySelectorAll('.round-detail-panel');
      existing.forEach(e => e.remove());
      if (row.classList.contains('selected')) { row.classList.remove('selected'); return; }
      body.querySelectorAll('.round-row.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');

      const rName = row.dataset.round;
      const players = roundMap[rName].sort((a, b) => a.pos - b.pos);

      // Build PCDJ cumulative points at this round
      const pcdj = data['PCDJ Ranking'];
      const pcdjSrc = pcdj ? (pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings) : null;
      const pcdjRoundName = currentSeason + ' ' + rName; // e.g. "Season 3 Round 5"
      const pcdjPtsMap = {};
      if (pcdjSrc) {
        const allRounds = new Set();
        pcdjSrc.forEach(p => p.history.forEach(h => allRounds.add(h.r)));
        const roundOrder = [...allRounds].sort((a, b) => roundSortKey(a) - roundSortKey(b));
        const targetIdx = roundOrder.indexOf(pcdjRoundName);
        if (targetIdx >= 0) {
          const roundsUpTo = new Set(roundOrder.slice(0, targetIdx + 1));
          pcdjSrc.forEach(p => {
            let cum = 0;
            p.history.forEach(h => { if (roundsUpTo.has(h.r)) cum += h.p; });
            if (cum > 0) pcdjPtsMap[p.name] = cum;
          });
        }
      }

      const panel = document.createElement('div');
      panel.className = 'round-detail-panel round-detail';
      const cols = '36px 1fr 60px 80px';
      let h = `<div style="display:grid;grid-template-columns:${cols};font-family:var(--mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;padding:0 0 6px;margin-bottom:4px;border-bottom:1px solid var(--row-border)">
        <div>Pos</div><div>Player</div><div style="text-align:right">PCDJ Pts</div><div style="text-align:right">Round</div></div>`;
      players.forEach((p, pi) => {
        const c = ptsColorSingle(p.pts);
        const bg = pi % 2 === 0 ? 'transparent' : 'var(--row-stripe)';
        const cumPts = pcdjPtsMap[p.name];
        const cumColor = cumPts ? ptsColor(cumPts) : 'var(--text-dark)';
        const cumHtml = cumPts ? `<span style="color:${cumColor}">${cumPts}</span>` : '<span style="color:var(--text-dark)">—</span>';
        h += `<div class="round-player-row" data-player="${esc(p.name)}" style="grid-template-columns:${cols};background:${bg}">
          <div style="font-family:var(--mono);color:var(--text-muted)">${p.pos}</div>
          <div class="round-player-link" style="font-weight:600;cursor:pointer;color:${customColors[p.name]||''}">${esc(p.name)}</div>
          <div style="text-align:right;font-family:var(--mono);font-size:11px">${cumHtml}</div>
          <div style="text-align:right;font-family:var(--mono);font-weight:700;color:${c}">${p.pts}</div>
        </div>`;
      });
      panel.innerHTML = h;
      // Make player names clickable for inline chart
      panel.querySelectorAll('.round-player-link').forEach(el => {
        el.onmouseenter = () => { el.style.textDecoration = 'underline'; };
        el.onmouseleave = () => { el.style.textDecoration = 'none'; };
        el.onclick = (e) => {
          e.stopPropagation();
          const name = el.closest('.round-player-row').dataset.player;
          // Close any existing inline chart
          panel.querySelectorAll('.round-inline-chart').forEach(c => c.remove());
          // Find player in current season or PCDJ data
          const pcdj = data['PCDJ Ranking'];
          const src = pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings;
          const playerObj = src.find(x => x.name === name);
          if (!playerObj) return;
          const chartEl = document.createElement('div');
          chartEl.className = 'round-inline-chart chart-panel';
          chartEl.style.cssText = 'margin:4px 0;border-radius:8px;';
          el.closest('.round-player-row').after(chartEl);
          drawRankChart(playerObj, chartEl);
          chartEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
      });
      row.after(panel);
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };
  });
}

function renderTierLegend() {
  const isPCDJ = data && data[currentSeason] && data[currentSeason].type === 'trailing';
  const thresholds = isPCDJ ? PCDJ_THRESHOLDS : SEASON_THRESHOLDS;
  const t = thresholds[pointsMode === 'championship' ? 'championship' : 'ranking'];
  const names = ['Legend', 'Pro', 'Master', 'Gold', 'Silver'];
  const el = document.getElementById('tierLegend');
  el.innerHTML = names.map((name, i) => {
    const label = i < t.length ? `${name} (${t[i]}+)` : name;
    return `<div class="tier-item"><div class="tier-dot" style="background:${TIER_COLORS[i]};box-shadow:0 0 4px ${TIER_COLORS[i]}40"></div><span style="color:${TIER_COLORS[i]}">${label}</span></div>`;
  }).join('');
}

function computeH2H(name1, name2) {
  const pcdj = data['PCDJ Ranking'];
  if (!pcdj) return { p1w: 0, p2w: 0, ties: 0, total: 0 };
  const src = pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings;
  const p1 = src.find(p => p.name === name1);
  const p2 = src.find(p => p.name === name2);
  if (!p1 || !p2) return { p1w: 0, p2w: 0, ties: 0, total: 0 };
  const map2 = new Map(p2.history.map(h => [h.r, h.pos]));
  let p1w = 0, p2w = 0, ties = 0, total = 0;
  p1.history.forEach(h => {
    if (map2.has(h.r)) {
      const p2pos = map2.get(h.r);
      total++;
      if (h.pos < p2pos) p1w++;
      else if (p2pos < h.pos) p2w++;
      else ties++;
    }
  });
  return { p1w, p2w, ties, total };
}

function drawCompareChart(p1hist, p2hist, panel) {
  const canvas = panel.querySelector('#compareCanvas');
  const tip = panel.querySelector('#compareTip');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 180 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '180px';
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 180;
  const pad = { l: 36, r: 12, t: 12, b: 28 };

  let totalRounds = 0;
  Object.keys(data).forEach(s => { if (data[s].type === 'season') totalRounds += (data[s].rounds_played || 0); });
  if (!totalRounds) totalRounds = 26;
  const xMin = 1, xMax = totalRounds;
  function xf(idx) { return pad.l + (idx - xMin) / (xMax - xMin || 1) * (W - pad.l - pad.r); }

  const ptsKey = compareChartMode === 'season' ? 'seasonPts' : 'pts';
  const allPtsVals = [...p1hist.map(d => d[ptsKey]), ...p2hist.map(d => d[ptsKey])];
  const ptsMax = Math.max(...allPtsVals, 100);
  function yPts(v) { return pad.t + (1 - v / ptsMax) * (H - pad.t - pad.b); }

  const seasonDivider = p1hist.seasonDividerIdx || p2hist.seasonDividerIdx || 0;

  function draw(highlight) {
    ctx.clearRect(0, 0, W, H);

    // Season divider
    if (seasonDivider > 0 && seasonDivider < totalRounds) {
      const divX = xf(seasonDivider + 0.5);
      ctx.strokeStyle = cssVar('--chart-divider'); ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(divX, pad.t); ctx.lineTo(divX, H - pad.b); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = cssVar('--chart-label'); ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'center';
      ctx.fillText('S2', (pad.l + divX) / 2, pad.t + 10);
      ctx.fillText('S3', (divX + W - pad.r) / 2, pad.t + 10);
    }

    // Grid
    ctx.strokeStyle = cssVar('--chart-grid'); ctx.lineWidth = 1;
    const steps = 5;
    for (let i = 0; i <= steps; i++) {
      const pv = Math.round(ptsMax * i / steps);
      const yv = yPts(pv);
      ctx.beginPath(); ctx.moveTo(pad.l, yv); ctx.lineTo(W - pad.r, yv); ctx.stroke();
      ctx.fillStyle = '#6b7280'; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'right';
      ctx.fillText(pv, pad.l - 6, yv + 3);
    }
    // X ticks
    ctx.fillStyle = '#6b7280'; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = 'center';
    for (let t = xMin; t <= xMax; t++) ctx.fillText(t, xf(t), H - 6);

    // Draw lines
    [p1hist, p2hist].forEach((hist, pi) => {
      const color = COMP_COLORS[pi];
      if (!hist.length) return;
      // Split into segments for season mode (break at season boundary)
      let segments;
      if (compareChartMode === 'season' && seasonDivider > 0) {
        const s2 = hist.filter(pt => pt.roundIdx <= seasonDivider);
        const s3 = hist.filter(pt => pt.roundIdx > seasonDivider);
        segments = [s2, s3].filter(s => s.length > 0);
      } else {
        segments = [hist];
      }
      segments.forEach(seg => {
        ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
        ctx.beginPath();
        seg.forEach((pt, i) => {
          const px = xf(pt.roundIdx), py = yPts(pt[ptsKey]);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();
        // Glow
        ctx.save(); ctx.globalAlpha = 0.12; ctx.strokeStyle = color; ctx.lineWidth = 6;
        ctx.beginPath();
        seg.forEach((pt, i) => {
          const px = xf(pt.roundIdx), py = yPts(pt[ptsKey]);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke(); ctx.restore();
      });
      // Dots
      hist.forEach(pt => {
        const isHl = highlight && pt.roundIdx === highlight.roundIdx;
        const isWin = pt.pos === 1;
        const px = xf(pt.roundIdx), py = yPts(pt[ptsKey]);
        if (isWin) {
          const r = isHl ? 7 : 4.5;
          ctx.beginPath();
          for (let k = 0; k < 10; k++) {
            const ang = -Math.PI / 2 + k * Math.PI / 5;
            const rad = k % 2 === 0 ? r : r * 0.45;
            ctx[k === 0 ? 'moveTo' : 'lineTo'](px + Math.cos(ang) * rad, py + Math.sin(ang) * rad);
          }
          ctx.closePath();
          ctx.fillStyle = '#ffd700'; ctx.fill();
          ctx.strokeStyle = '#b8960c'; ctx.lineWidth = isHl ? 1.5 : 1; ctx.stroke();
        } else {
          ctx.beginPath(); ctx.arc(px, py, isHl ? 5 : 2.5, 0, Math.PI * 2);
          if (isHl) { ctx.fillStyle = cssVar('--dot-hl'); ctx.fill(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke(); }
          else { ctx.fillStyle = color; ctx.fill(); }
        }
      });
    });
  }

  draw(null);

  canvas.onmousemove = (e) => {
    const br = canvas.getBoundingClientRect();
    const mx = e.clientX - br.left;
    const allPts = [...p1hist, ...p2hist];
    let closest = null, minDist = Infinity;
    allPts.forEach(pt => { const d = Math.abs(xf(pt.roundIdx) - mx); if (d < minDist) { minDist = d; closest = pt; } });
    if (closest && minDist < 30) {
      canvas.style.cursor = 'pointer';
      tip.style.display = 'block';
      const ri = closest.roundIdx;
      const pt1 = p1hist.find(p => p.roundIdx === ri);
      const pt2 = p2hist.find(p => p.roundIdx === ri);
      let html = `<div class="t-round">${esc(closest.round)}</div>`;
      if (pt1) html += `<div class="t-val" style="color:${COMP_COLORS[0]}">${esc(compareList[0])}: <span>${pt1[ptsKey]}</span>${pt1.pos ? ` (#${pt1.pos})` : ''}</div>`;
      if (pt2) html += `<div class="t-val" style="color:${COMP_COLORS[1]}">${esc(compareList[1])}: <span>${pt2[ptsKey]}</span>${pt2.pos ? ` (#${pt2.pos})` : ''}</div>`;
      tip.innerHTML = html;
      let tx = xf(ri) + 12;
      if (tx + 180 > W) tx = xf(ri) - 190;
      tip.style.left = tx + 'px';
      tip.style.top = '40px';
      draw(closest);
    } else {
      canvas.style.cursor = ''; tip.style.display = 'none'; draw(null);
    }
  };
  canvas.onmouseleave = () => { tip.style.display = 'none'; canvas.style.cursor = ''; draw(null); };
}

function renderComparePanel() {
  const panel = document.getElementById('comparePanel');
  if (!compareMode || compareList.length === 0) { panel.innerHTML = ''; return; }

  const pcdj = data['PCDJ Ranking'];
  const src = pcdj ? (pointsMode === 'championship' && pcdj.championship ? pcdj.championship : pcdj.rankings) : [];

  if (compareList.length === 1) {
    const p = src.find(x => x.name === compareList[0]);
    const c = p ? ptsColor(p.points) : COMP_COLORS[0];
    panel.innerHTML = `<div class="compare-panel" style="text-align:center;font-family:var(--mono);font-size:12px">
      <span style="color:${COMP_COLORS[0]};font-weight:700">${esc(compareList[0])}</span>
      <span style="color:var(--text-muted)"> — select a 2nd player</span>
      <button class="close-btn" style="margin-left:10px" onclick="clearCompare()">✕</button>
    </div>`;
    return;
  }

  // Two players selected
  const p1 = src.find(x => x.name === compareList[0]);
  const p2 = src.find(x => x.name === compareList[1]);
  if (!p1 || !p2) { panel.innerHTML = ''; return; }

  const h2h = computeH2H(compareList[0], compareList[1]);
  const p1hist = buildRankHistory(compareList[0]);
  const p2hist = buildRankHistory(compareList[1]);

  const pod1 = p1.podiums.gold + p1.podiums.silver + p1.podiums.bronze;
  const pod2 = p2.podiums.gold + p2.podiums.silver + p2.podiums.bronze;

  function compRow(label, v1, v2, higherWins) {
    const w1 = higherWins ? v1 > v2 : v1 < v2;
    const w2 = higherWins ? v2 > v1 : v2 < v1;
    return `<div class="comp-left${w1 ? ' comp-winner' : ''}" style="color:${w1 ? COMP_COLORS[0] : 'var(--text-dim)'}">${v1}</div>
      <div class="comp-label">${label}</div>
      <div class="comp-right${w2 ? ' comp-winner' : ''}" style="color:${w2 ? COMP_COLORS[1] : 'var(--text-dim)'}">${v2}</div>`;
  }

  panel.innerHTML = `<div class="compare-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div id="compSwap" style="font-family:var(--mono);font-size:13px;cursor:pointer" title="Click to swap sides">
        <span style="color:${COMP_COLORS[0]};font-weight:700">${esc(compareList[0])}</span>
        <span style="color:var(--text-muted)"> vs </span>
        <span style="color:${COMP_COLORS[1]};font-weight:700">${esc(compareList[1])}</span>
      </div>
      <button class="close-btn" onclick="clearCompare()">✕</button>
    </div>
    <div style="text-align:center;font-family:var(--mono);font-size:11px;margin-bottom:10px;color:var(--text-dim)">
      H2H: <span style="color:${COMP_COLORS[0]};font-weight:700">${h2h.p1w}</span>
      <span style="color:var(--text-muted)"> - ${h2h.ties > 0 ? h2h.ties + ' - ' : ''}</span>
      <span style="color:${COMP_COLORS[1]};font-weight:700">${h2h.p2w}</span>
      <span style="color:var(--text-muted)"> (${h2h.total} shared rounds)</span>
    </div>
    <div class="comp-grid">
      ${compRow('Points', p1.points, p2.points, true)}
      ${compRow('Rounds', p1.rounds, p2.rounds, true)}
      ${compRow('Wins', p1.wins, p2.wins, true)}
      ${compRow('Podiums', pod1, pod2, true)}
      ${compRow('Best', p1.best_pos, p2.best_pos, false)}
      ${compRow('Avg Pos', p1.avg_pos, p2.avg_pos, false)}
    </div>
    <div style="display:flex;gap:4px;margin-top:10px;margin-bottom:6px">
      <button class="chart-mode-btn${compareChartMode === 'ranking' ? ' active' : ''}" id="compModeRanking" style="--mc:var(--accent)">Ranking Pts</button>
      <button class="chart-mode-btn${compareChartMode === 'season' ? ' active' : ''}" id="compModeSeason" style="--mc:var(--accent)">Season Pts</button>
    </div>
    <div class="chart-canvas"><canvas id="compareCanvas"></canvas><div class="tooltip" id="compareTip"></div></div>
  </div>`;

  panel.querySelector('#compModeRanking').onclick = () => { compareChartMode = 'ranking'; renderComparePanel(); };
  panel.querySelector('#compModeSeason').onclick = () => { compareChartMode = 'season'; renderComparePanel(); };
  panel.querySelector('#compSwap').onclick = () => { compareList.reverse(); renderComparePanel(); render(); };

  drawCompareChart(p1hist, p2hist, panel);
}

function clearCompare() {
  compareList = [];
  compareMode = false;
  document.getElementById('compareCheck').checked = false;
  renderComparePanel();
  render();
}

// --- Render ---
function renderSearch(query) {
  const season = data[currentSeason];
  if (!season) return;
  renderRankingsHeader();
  const src = pointsMode === 'championship' && season.championship ? season.championship : season.rankings;
  const matches = src.filter(p => p.name.toLowerCase().includes(query)).slice(0, 50);
  const tl = document.getElementById("tierLegend");
  tl.innerHTML = `<span style="color:var(--text-muted)">${matches.length} result${matches.length !== 1 ? 's' : ''}</span>`;
  const body = document.getElementById("tableBody");
  if (!matches.length) {
    body.innerHTML = `<div style="padding:24px;color:var(--text-muted);">No players found</div>`;
    return;
  }
  const statusKey = currentSeason.toLowerCase().replace(/ /g, '_');
  const snap = statusData[statusKey] || {};
  body.innerHTML = matches.map((p, i) => {
    const c = ptsColor(p.points);
    const wc = p.wins > 0 ? 'var(--accent)' : 'var(--text-dark)';
    const totalPod = p.podiums.gold + p.podiums.silver + p.podiums.bronze;
    const prevPod = snap[p.name] ? { g: snap[p.name][3], s: snap[p.name][4], b: snap[p.name][5] } : null;
    const podDeltas = [];
    if (prevPod && p.podiums.gold > prevPod.g) podDeltas.push(`<span style="color:var(--accent)">+${p.podiums.gold - prevPod.g}G</span>`);
    if (prevPod && p.podiums.silver > prevPod.s) podDeltas.push(`<span style="color:#6b7280">+${p.podiums.silver - prevPod.s}S</span>`);
    if (prevPod && p.podiums.bronze > prevPod.b) podDeltas.push(`<span style="color:#78716c">+${p.podiums.bronze - prevPod.b}B</span>`);
    const podDeltaStr = podDeltas.length ? `<span style="font-size:10px;position:absolute;left:100%;white-space:nowrap;margin-left:4px">${podDeltas.join(' ')}</span>` : '';
    const podStr = totalPod > 0
      ? `<span style="position:relative;display:inline-block"><span style="color:var(--accent)">${p.podiums.gold}</span>/<span style="color:#6b7280">${p.podiums.silver}</span>/<span style="color:#78716c">${p.podiums.bronze}</span> <span style="color:var(--text-muted)">(${totalPod})</span>${podDeltaStr}</span>`
      : `<span style="color:var(--text-dark)">0</span>`;
    const bestC = p.best_pos === 1 ? 'var(--accent)' : p.best_pos <= 3 ? 'var(--text)' : 'var(--text-dim)';
    const avgPosC = p.avg_pos <= 3 ? 'var(--green)' : p.avg_pos <= 5 ? 'var(--text-dim)' : 'var(--text-muted)';
    const prev = snap[p.name];
    let deltaStr = '';
    if (prev) {
      const diff = prev[0] - p.rank;
      if (diff > 0) deltaStr = `<span style="color:var(--green);font-size:10px;margin-left:4px">+${diff}</span>`;
      else if (diff < 0) deltaStr = `<span style="color:var(--red);font-size:10px;margin-left:4px">${diff}</span>`;
    } else if (Object.keys(snap).length > 0 && p.points > 0) {
      deltaStr = `<span style="color:var(--green);font-size:10px;margin-left:4px">NEW</span>`;
    }
    let milestones = [];
    if (prev) {
      const [, , oldW, oldG, oldS, oldB] = prev;
      const totalPodOld = oldG + oldS + oldB;
      const totalPodNew = p.podiums.gold + p.podiums.silver + p.podiums.bronze;
      if (p.wins > 0 && oldW === 0) milestones.push('🏆 1st Win!');
      if (totalPodNew > 0 && totalPodOld === 0) milestones.push('🥇 1st Podium!');
    }
    const milestoneStr = milestones.length ? ` <span style="font-size:9px;color:var(--accent)">${milestones.join(' ')}</span>` : '';
    return `<div class="row" data-name="${esc(p.name)}" style="grid-template-columns:${RANK_COLS}">
      <div class="rank">${p.rank}${deltaStr}</div>
      <div class="player"><span class="dot" style="background:${c};box-shadow:0 0 5px ${c}40"></span><span class="pname" style="color:${customColors[p.name]||''}">${esc(p.name)}</span>${milestoneStr}</div>
      <div style="text-align:right;font-family:var(--mono);font-weight:700;color:${c}">${prev && p.points - prev[1] > 0 ? `<span style="color:var(--green);font-size:10px;margin-right:4px">+${Math.round(p.points - prev[1])}</span>` : ''}${p.points}</div>
      <div style="text-align:right;font-family:var(--mono);color:var(--text-dim)">${p.rounds}</div>
      <div style="text-align:right;font-family:var(--mono);font-weight:600;color:${wc}">${p.wins}</div>
      <div style="text-align:center;font-family:var(--mono)">${podStr}</div>
      <div style="text-align:right;font-family:var(--mono);color:${bestC}">${p.best_pos}</div>
      <div style="text-align:right;font-family:var(--mono);color:${avgPosC}">${p.avg_pos}</div>
    </div>`;
  }).join('');
  body.querySelectorAll('.row').forEach(row => {
    row.onclick = () => {
      const existing = body.querySelectorAll('.chart-panel');
      existing.forEach(e => e.remove());
      if (row.classList.contains('selected')) { row.classList.remove('selected'); return; }
      body.querySelectorAll('.row.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
      const playerSrc = pointsMode === 'championship' && season.championship ? season.championship : season.rankings;
      const player = playerSrc.find(p => p.name === row.dataset.name);
      if (!player) return;
      const panel = document.createElement('div');
      panel.className = 'chart-panel';
      row.after(panel);
      drawRankChart(panel, player, season);
    };
  });
}

function render() {
  renderComparePanel();
  const sq = document.getElementById("searchInput").value.trim().toLowerCase();
  if (sq.length >= 2) { renderSearch(sq); return; }
  if (viewMode === 'rankings') renderRankings();
  else renderRounds();
  renderTierLegend();
}

// --- Init ---
let statusData = {};
Promise.all([
  fetch('petite_rankings.json?v=' + Date.now()).then(r => r.json()),
  fetch('status.json?v=' + Date.now()).then(r => r.json()).catch(() => ({}))
]).then(([d, s]) => {
    data = d;
    statusData = s;
    const seasons = Object.keys(data);
    // Default to latest season (not trailing/PCDJ)
    const seasonKeys = seasons.filter(s => data[s].type === 'season');
    currentSeason = seasonKeys.length > 0 ? seasonKeys[seasonKeys.length - 1] : seasons[0];
    buildSeasonTabs();
    render();
  });
</script>
